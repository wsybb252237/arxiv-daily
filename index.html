<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的 arxiv CV 日报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#222;font-size:15px}

/* header */
.hd{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:32px 20px 28px;text-align:center}
.hd h1{font-size:24px;font-weight:700;letter-spacing:1px}
.hd .tagline{margin-top:6px;opacity:.85;font-size:14px}
.hd .updated{margin-top:10px;font-size:12px;opacity:.7}

/* summary bar */
.summary{background:#fff;padding:14px 20px;border-bottom:1px solid #eee;text-align:center;color:#555;font-size:13px}

/* content */
.content{max-width:700px;margin:0 auto;padding:20px 16px}

/* month section */
.month-section{margin-bottom:24px}
.month-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.month-title{font-size:17px;font-weight:700;color:#333}
.month-count{font-size:12px;color:#aaa}
.month-cards{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}

/* day card */
.day-card{display:flex;align-items:center;padding:14px 16px;text-decoration:none;color:inherit;border-bottom:1px solid #f2f2f2;transition:background .15s;touch-action:manipulation}
.day-card:last-child{border-bottom:none}
.day-card:hover,.day-card:active{background:#f8f8ff}

.day-card-left{width:52px;flex-shrink:0;text-align:center}
.day-date{font-size:15px;font-weight:700;color:#333}
.day-week{font-size:11px;color:#aaa;margin-top:2px}

.day-card-body{flex:1;padding:0 12px}
.day-total{font-size:14px;font-weight:600;color:#444;margin-bottom:7px}
.day-cats{display:flex;flex-wrap:wrap;gap:5px}
.cat-tag{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500;white-space:nowrap}

.day-arrow{color:#ccc;font-size:22px;flex-shrink:0}

/* empty */
.empty{text-align:center;padding:60px 20px;color:#bbb;font-size:15px}

@media(max-width:500px){
  .hd h1{font-size:20px}
  .day-card-left{width:44px}
  .day-date{font-size:14px}
}
</style>
</head>
<body>

</div>
</div>

</body>
</html>
