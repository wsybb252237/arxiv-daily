name: Daily arXiv CV Papers

on:
  schedule:
    # 每天 02:30 UTC（北京时间 10:30）周一至周五执行
    # arxiv 在 UTC 00:00-02:00 更新前一天提交的论文
    - cron: '30 2 * * 1-5'
  workflow_dispatch:   # 支持手动触发，方便补跑或测试

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限才能 push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run fetch_papers.py
        run: python fetch_papers.py
        env:
          CI: "true"   # 禁止脚本尝试打开浏览器

      - name: Show result
        if: always()
        run: |
          echo "=== papers_index.json (latest 3 entries) ==="
          python3 -c "
          import json
          with open('papers_index.json') as f:
              d = json.load(f)
          for k in sorted(d)[-3:]:
              print(k, d[k]['total'], '篇')
          " 2>/dev/null || echo "(no data yet)"
